name: Deploy to Netlify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Required for Netlify action to update commit status and comments
permissions:
  contents: write
  statuses: write
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Project
        run: |
          # Only the resume-site has a build script
          npx pnpm --filter @workspace/resume-site build

      - name: Database Push
        run: |
          npx pnpm --filter @workspace/db run push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}


      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: artifacts/resume-site/dist/public
          functions-dir: artifacts/resume-site/netlify/functions
          production-deploy: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Disable verbose comments to keep the log clean
          enable-commit-comment: false
          enable-pull-request-comment: false
          enable-commit-status: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

