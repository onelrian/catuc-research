name: Deploy to Netlify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Required for Netlify action to update commit status and comments
permissions:
  contents: write
  statuses: write
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Project
        run: |
          # Build library dependencies first as required by README
          pnpm run --filter @workspace/api-zod --if-present build
          pnpm run --filter @workspace/api-client-react --if-present build
          # Build the main site
          pnpm run --filter @workspace/resume-site build
          # Build the standalone Netlify Function (Bakes in all dependencies)
          export NODE_ENV=production
          pnpm run --filter @workspace/api-server build:netlify

      - name: Database Push
        run: |
          npx pnpm --filter @workspace/db run push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Database Seed
        run: |
          # Use tsx to run the standalone seeding script
          pnpm dlx tsx artifacts/api-server/src/seed.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # We don't need AUTO_SEED=true here as we are calling the script directly


      - name: Deploy to Netlify
        run: |
          if [ "${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}" = "true" ]; then
            npx netlify-cli deploy --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }} --filter @workspace/resume-site --dir=artifacts/resume-site/dist/public --functions=artifacts/resume-site/dist-functions --prod
          else
            npx netlify-cli deploy --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }} --filter @workspace/resume-site --dir=artifacts/resume-site/dist/public --functions=artifacts/resume-site/dist-functions
          fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

