openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: surveys
    description: Survey management
  - name: responses
    description: Survey response collection
  - name: results
    description: Results and analysis
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /surveys:
    get:
      operationId: listSurveys
      tags: [surveys]
      summary: List all surveys
      responses:
        "200":
          description: List of surveys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Survey"
    post:
      operationId: createSurvey
      tags: [surveys]
      summary: Create a new survey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSurveyBody"
      responses:
        "201":
          description: Created survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"

  /surveys/{surveyId}:
    get:
      operationId: getSurvey
      tags: [surveys]
      summary: Get a survey with its questions
      parameters:
        - name: surveyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Survey with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyWithQuestions"
        "404":
          description: Survey not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSurvey
      tags: [surveys]
      summary: Update a survey
      parameters:
        - name: surveyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSurveyBody"
      responses:
        "200":
          description: Updated survey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Survey"
    delete:
      operationId: deleteSurvey
      tags: [surveys]
      summary: Delete a survey
      parameters:
        - name: surveyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /surveys/{surveyId}/responses:
    post:
      operationId: submitResponse
      tags: [responses]
      summary: Submit a response to a survey
      parameters:
        - name: surveyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitResponseBody"
      responses:
        "201":
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseRecord"
        "404":
          description: Survey not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /surveys/{surveyId}/results:
    get:
      operationId: getSurveyResults
      tags: [results]
      summary: Get aggregated results for a survey
      parameters:
        - name: surveyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Aggregated results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveyResults"
        "404":
          description: Survey not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /surveys/{surveyId}/responses/raw:
    get:
      operationId: getRawResponses
      tags: [results]
      summary: Get all raw responses for a survey
      parameters:
        - name: surveyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Raw response list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResponseWithAnswers"

  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      tags: [results]
      summary: Get overview stats across all surveys
      responses:
        "200":
          description: Overview stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverview"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "302":
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileTokenExchangeRequest"
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenExchangeSuccess"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
      responses:
        "200":
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Survey:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        responseCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, title, isActive, responseCount, createdAt, updatedAt]

    SurveyWithQuestions:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        responseCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
      required: [id, title, isActive, responseCount, createdAt, updatedAt, questions]

    Question:
      type: object
      properties:
        id:
          type: integer
        surveyId:
          type: integer
        text:
          type: string
        type:
          type: string
          enum: [text, multiple_choice, rating, yes_no]
        options:
          type: array
          items:
            type: string
        isRequired:
          type: boolean
        orderIndex:
          type: integer
        section:
          type: string
        sectionDescription:
          type: string
      required: [id, surveyId, text, type, options, isRequired, orderIndex]

    CreateSurveyBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/CreateQuestionBody"
      required: [title, questions]

    CreateQuestionBody:
      type: object
      properties:
        text:
          type: string
        type:
          type: string
          enum: [text, multiple_choice, rating, yes_no]
        options:
          type: array
          items:
            type: string
        isRequired:
          type: boolean
        orderIndex:
          type: integer
      required: [text, type]

    UpdateSurveyBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        isActive:
          type: boolean
        questions:
          type: array
          items:
            $ref: "#/components/schemas/CreateQuestionBody"

    SubmitResponseBody:
      type: object
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/AnswerInput"
      required: [answers]

    AnswerInput:
      type: object
      properties:
        questionId:
          type: integer
        value:
          type: string
        values:
          type: array
          items:
            type: string
      required: [questionId]

    ResponseRecord:
      type: object
      properties:
        id:
          type: integer
        surveyId:
          type: integer
        userId:
          type: string
        submittedAt:
          type: string
      required: [id, surveyId, submittedAt]

    ResponseWithAnswers:
      type: object
      properties:
        id:
          type: integer
        surveyId:
          type: integer
        submittedAt:
          type: string
        answers:
          type: array
          items:
            $ref: "#/components/schemas/Answer"
      required: [id, surveyId, submittedAt, answers]

    Answer:
      type: object
      properties:
        id:
          type: integer
        questionId:
          type: integer
        questionText:
          type: string
        value:
          type: string
        values:
          type: array
          items:
            type: string
      required: [id, questionId, questionText]

    SurveyResults:
      type: object
      properties:
        surveyId:
          type: integer
        surveyTitle:
          type: string
        totalResponses:
          type: integer
        completionRate:
          type: number
        questionResults:
          type: array
          items:
            $ref: "#/components/schemas/QuestionResult"
        recentResponses:
          type: array
          items:
            $ref: "#/components/schemas/ResponseRecord"
      required: [surveyId, surveyTitle, totalResponses, completionRate, questionResults, recentResponses]

    QuestionResult:
      type: object
      properties:
        questionId:
          type: integer
        questionText:
          type: string
        questionType:
          type: string
        totalAnswers:
          type: integer
        textAnswers:
          type: array
          items:
            type: string
        choiceCounts:
          type: object
          additionalProperties:
            type: integer
        averageRating:
          type: number
        ratingDistribution:
          type: object
          additionalProperties:
            type: integer
      required: [questionId, questionText, questionType, totalAnswers]

    DashboardOverview:
      type: object
      properties:
        totalSurveys:
          type: integer
        activeSurveys:
          type: integer
        totalResponses:
          type: integer
        responsesToday:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
      required: [totalSurveys, activeSurveys, totalResponses, responsesToday, recentActivity]

    ActivityItem:
      type: object
      properties:
        surveyId:
          type: integer
        surveyTitle:
          type: string
        responseCount:
          type: integer
        lastResponseAt:
          type: string
      required: [surveyId, surveyTitle, responseCount]

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl, isAdmin]
      properties:
        id:
          type: string
        email:
          type: [string, "null"]
          format: email
        firstName:
          type: [string, "null"]
        lastName:
          type: [string, "null"]
        profileImageUrl:
          type: [string, "null"]
        isAdmin:
          type: boolean

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
