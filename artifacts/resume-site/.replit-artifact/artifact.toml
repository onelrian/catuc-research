kind = "web"
previewPath = "/"
title = "Ashley's Resume Site"
version = "1.0.0"
id = "artifacts/resume-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22358

[services.development]
run = "pnpm --filter @workspace/resume-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-site", "run", "build" ]
publicDir = "artifacts/resume-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22358"
BASE_PATH = "/"
