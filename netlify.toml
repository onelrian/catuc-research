[build]
  base = "artifacts/resume-site"
  command = "cd ../.. && corepack enable pnpm && pnpm install --no-frozen-lockfile && pnpm run --filter @workspace/resume-site build"
  publish = "artifacts/resume-site/dist/public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "artifacts/resume-site/netlify/functions"
  node_bundler = "esbuild"

# 1. API Redirect: Routes all /api/* requests to the Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# 2. SPA routing: Ensures React Router works on page refreshes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
