[build]
  base = ""
  command = "pnpm run --filter @workspace/resume-site build"
  publish = "artifacts/resume-site/dist/public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "artifacts/resume-site/netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = []

# 1. (Handled by Netlify V2 Function natively)
# [[redirects]]
#   from = "/api/*"
#   to = "/.netlify/functions/api/:splat"
#   status = 200
#   force = true

# 2. SPA routing: Ensures React Router works on page refreshes
[[redirects]]
  from = "/*"
  to = "/artifacts/resume-site/dist/public/index.html"
  status = 200
