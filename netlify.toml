[build]
  command = "npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm run --filter @workspace/api-zod build && pnpm run --filter @workspace/api-client-react build && pnpm run --filter @workspace/resume-site build"
  publish = "artifacts/resume-site/dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH = "/"

# 1. API Function path is defined in netlify/functions/api.mts

# 2. SPA routing: Ensures React Router works on page refreshes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

