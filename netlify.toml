[build]
  base = ""
  command = "pnpm run --filter @workspace/resume-site build"
  publish = "artifacts/resume-site/dist/public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "artifacts/resume-site/dist-functions"
  node_bundler = "none"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# 2. SPA routing: Ensures React Router works on page refreshes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
