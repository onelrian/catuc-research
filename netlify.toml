[build]
  command = "corepack enable pnpm && pnpm install --no-frozen-lockfile && pnpm run --filter @workspace/api-zod build && pnpm run --filter @workspace/api-client-react build && pnpm run --filter @workspace/resume-site build"
  publish = "artifacts/resume-site/dist/public"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "artifacts/resume-site/netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

